apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: internet-probes
  namespace: monitoring
  labels:
    release: monitoring
spec:
  interval: 30s
  module: icmp
  prober:
    url: blackbox-prometheus-blackbox-exporter.monitoring.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - 8.8.8.8
        - 1.1.1.1
